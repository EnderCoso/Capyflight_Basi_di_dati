<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Voli DB</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f9; color: #333; margin:0; padding:0; }
        .header { background: white; padding: 16px 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); display:flex; align-items:center; justify-content:space-between; }
        .logo { cursor: pointer; transition: transform 0.3s; }
        .logo:hover { transform: scale(1.05); }
        .container { max-width: 400px; margin: 40px auto; padding: 30px; background: #fff; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        form { display: flex; flex-direction: column; }
        input { margin-bottom: 15px; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        input:focus { outline: none; border-color: #3498db; }
        button { padding: 12px; background: #007bff; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; transition: background 0.3s; }
        button:hover { background: #0056b3; }
        .message { padding: 10px; margin-bottom: 15px; border-radius: 4px; text-align: center; }
        .message.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .message.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .demo-accounts { margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 4px; font-size: 12px; }
        .demo-accounts h4 { margin-top: 0; color: #6c757d; }
        .demo-accounts p { margin: 5px 0; }
        .login-actions { text-align:center; margin-top: 15px; }
        .login-actions a { color: #3498db; text-decoration: none; }
    </style>
</head>
<body>
    <div class="header">
        <a href="{{ url_for('main.home') }}">
            <img src="{{ url_for('static', filename='Logo.png') }}" alt="Logo" class="logo" style="max-height: 60px;">
        </a>
    </div>

    <div class="container">
        <h1>🔐 Login</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="message {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Accedi</button>
        </form>

        <div class="login-actions">
            <a href="{{ url_for('main.home') }}">← Torna alla Home</a>
        </div>
    </div>
</body>
</html>
